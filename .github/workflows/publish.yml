name: Publish to npm

on:
  release:
    types:
      - published
  push:
    branches:
      - master
    paths:
      - package.json

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check npm version
        id: npm-version
        continue-on-error: true
        run: npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version

      - name: Publish package
        if: steps.npm-version.outcome == 'failure'
        run: npm publish

      - name: Skip existing version
        if: steps.npm-version.outcome == 'success'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists on npm; skipping publish."
